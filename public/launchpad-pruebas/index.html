<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP S/4HANA Cloud</title>

<!-- Guardián de acceso -->
<script>if (sessionStorage.getItem("gsg_auth") !== "1") { location.replace("login.html"); }</script>

<!-- Config del Fiori Launchpad sandbox (tiles de la Factory) -->
<script>
window["sap-ushell-config"] = {
    defaultRenderer: "fiori2",
    renderers: { fiori2: { componentData: { config: { enableSearch: false, rootIntent: "Shell-home" } } } },
    services: {
        LaunchPage: {
            adapter: {
                config: {
                    groups: [
                        {
                            id: "grpDesarrollos",
                            title: "Desarrollos de la Factory",
                            isPreset: true, isVisible: true, isGroupLocked: false,
                            tiles: [
                                { id: "t-recpam", tileType: "sap.ushell.ui.tile.StaticTile",
                                  properties: { title: "RECPAM", subtitle: "Ajuste por inflación (RT 6)", icon: "sap-icon://line-chart", targetURL: "#RECPAM-display" } },
                                { id: "t-iibb", tileType: "sap.ushell.ui.tile.StaticTile",
                                  properties: { title: "IIBB Provincial", subtitle: "Percepción / retención · padrones", icon: "sap-icon://money-bills", targetURL: "#IIBB-display" } },
                                { id: "t-tablero", tileType: "sap.ushell.ui.tile.StaticTile",
                                  properties: { title: "Tablero de desarrollos", subtitle: "RECPAM + IIBB", icon: "sap-icon://business-objects-experience", targetURL: "#Tablero-display" } }
                            ]
                        },
                        {
                            id: "grpFTS",
                            title: "Fit-to-Standard · Finanzas",
                            isPreset: true, isVisible: true, isGroupLocked: false,
                            tiles: [
                                { id: "t-fts", tileType: "sap.ushell.ui.tile.StaticTile",
                                  properties: { title: "Contabilidad y Cierre", subtitle: "RTR · J58", icon: "sap-icon://accounting-document-verification", targetURL: "#FTS-display" } },
                                { id: "t-aa", tileType: "sap.ushell.ui.tile.StaticTile",
                                  properties: { title: "Activos Fijos", subtitle: "J62 · revaluación por índice", icon: "sap-icon://building", targetURL: "#FTS-display" } }
                            ]
                        }
                    ]
                }
            }
        },
        NavTargetResolution: {
            config: {
                allowTestUrlComponentConfig: true,
                runStandaloneAppFolderWhitelist: { "*": true }
            }
        }
    },
    applications: {
        "RECPAM-display":  { additionalInformation: "", applicationType: "URL", url: "apps/recpam.html",       title: "RECPAM — Ajuste por inflación", description: "Reexpresión y asiento (RT 6)" },
        "IIBB-display":    { additionalInformation: "", applicationType: "URL", url: "apps/desarrollos.html",  title: "IIBB Provincial",               description: "Percepción / retención multi-jurisdicción" },
        "Tablero-display": { additionalInformation: "", applicationType: "URL", url: "apps/desarrollos.html",  title: "Tablero de desarrollos",        description: "RECPAM + IIBB" },
        "FTS-display":     { additionalInformation: "", applicationType: "URL", url: "apps/fts.html",          title: "Fit-to-Standard · Finanzas",    description: "Paquetes de workshop" }
    }
};
</script>

<!-- SAPUI5 (LTS) + FLP sandbox, tema Horizon -->
<script src="https://ui5.sap.com/1.120.20/test-resources/sap/ushell/bootstrap/sandbox.js" id="sap-ushell-bootstrap"></script>
<script id="sap-ui-bootstrap"
    src="https://ui5.sap.com/1.120.20/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m, sap.ushell, sap.ui.layout"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-compat-version="edge"
    data-sap-ui-frame-options="allow"
    data-sap-ui-binding-syntax="complex">
</script>

<script>
    sap.ui.getCore().attachInit(function () {
        sap.ushell.Container.createRenderer(null, true).then(function (content) {
            content.placeAt("content");
            try {
                var b = document.createElement("div");
                b.textContent = "ENTORNO DE DEMOSTRACIÓN — datos ficticios · construido con tecnología SAPUI5";
                b.style.cssText = "position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:100000;background:#b8860b;color:#fff;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;font-size:11px;font-weight:700;letter-spacing:.3px;padding:3px 14px;border-radius:0 0 8px 8px;box-shadow:0 1px 4px rgba(0,0,0,.25);";
                document.body.appendChild(b);
            } catch (e) {}
        });
    });
</script>

<style>
    html, body { height: 100%; margin: 0; }
    #content { height: 100%; }
</style>
</head>
<body class="sapUiBody">
    <div id="content"></div>
</body>
</html>
